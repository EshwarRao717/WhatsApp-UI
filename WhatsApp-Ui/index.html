<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">

    <div class="top-bar">
      <img class="chat-logo" src="https://imgs.search.brave.com/IL2uSXpN0zlZM4hF2rxS9dLRavkC3qipoAqdcMY62yg/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly93MC5w/ZWFrcHguY29tL3dh/bGxwYXBlci82LzUw/OC9IRC13YWxscGFw/ZXItcGFuZGEtcHJv/ZmlsZS5qcGc">
      <div class="icons">
        <span>💬</span>
        <span>⋮</span>
      </div>
    </div>

    <div class="search-box">
      <input type="text" placeholder="Search chats..." id="searchInput">
    </div>

    <div class="chat-list" id="chatList">
      <div class="chat active" onclick="openChat('Rahul')">
        <img class="chat-logo" src="https://imgs.search.brave.com/XE3C9Mg7t0k12o1vvRA934XikfMZsOUDLcxXWqH7xLQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzLzI3Lzdh/LzlkLzI3N2E5ZDVm/ZTIyMjczZTA5Y2Vi/ODY5MDBkMzkzZDli/LmpwZw">
        <div class="chat-info">
          <h4>Rahul</h4>
          <p>Hello bro!</p>
        </div>
        <span class="time">10:30</span>
      </div>

      <div class="chat" onclick="openChat('Priya')">
        <img class="chat-logo" src="https://imgs.search.brave.com/YtDcA0vklfWfeacSXL7XdzBNTOL4HWOGMNkvaDwQuoc/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly93YWxs/cGFwZXJjYXZlLmNv/bS93cC93cDEyNTIy/NjQxLmpwZw">
        <div class="chat-info">
          <h4>Priya</h4>
          <p>Where are you?</p>
        </div>
        <span class="time">09:20</span>
      </div>

      <div class="chat" onclick="openChat('Aman')">
        <img class="chat-logo" src="https://imgs.search.brave.com/p1BasjtLVU21g79L_jyeHcIHv10P0gcOPpEwrb5qNY0/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tcndh/bGxwYXBlci5jb20v/aW1hZ2VzL3RodW1i/bmFpbC9jb29sLXBy/b2ZpbGUtcGljdHVy/ZXMtaG9vZGllLWNh/dC02ZGtsNTZoaXho/bnE1OTBnLmpwZw">
        <div class="chat-info">
          <h4>Aman</h4>
          <p>Let's play!</p>
        </div>
        <span class="time">Yesterday</span>
      </div>
    </div>

  </div>

  <!-- Chat Area -->
  <div class="chat-area">

    <div class="chat-header">
      <img class="chat-logo" src="https://imgs.search.brave.com/XE3C9Mg7t0k12o1vvRA934XikfMZsOUDLcxXWqH7xLQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzLzI3Lzdh/LzlkLzI3N2E5ZDVm/ZTIyMjczZTA5Y2Vi/ODY5MDBkMzkzZDli/LmpwZw">
      <div>
        <h3 id="chatName">Rahul</h3>
        <p>Online</p>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg left">Hi! <span>10:20</span></div>
      <div class="msg right">Hello 👋 <span>10:21</span></div>
    </div>

    <div class="input-box">
      <span>😊</span>
      <input type="text" id="msgInput" placeholder="Type a message">
      <button onclick="sendMsg()">➤</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
